<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f7fa}
.topo{background:linear-gradient(135deg,#1a3a6e,#2a5a9e);color:white;text-align:center;padding:25px 15px;border-bottom-left-radius:30px;border-bottom-right-radius:30px}

.subsecoes a{display:block;padding:14px 0;color:#333;text-decoration:none;border-bottom:1px solid #eee;font-size:15px}
.subsecoes a:last-child{border:none}
.subsecoes a:hover{color:#1a3a6e;font-weight:bold}
