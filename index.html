.topo{background:linear-gradient(180deg,#0d47a1 0%, #1976d2 50%, #42a5f5 100%);color:white;text-align:center;padding:20px 15px 45px;border-bottom-left-radius:25px;border-bottom-right-radius:25px;position:relative}
